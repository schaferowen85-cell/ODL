<style>
  html, body { margin: 0; padding: 0; background: #1a1a1a; font-family: 'Inter', sans-serif; }
  .logo-frame { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
  .dark { background: #0e0e10; color: #f5f3ee; }
  .light { background: #f5f3ee; color: #0e0e10; }
  .cream { background: #efe9dd; color: #1a1a1a; }
  .ink   { background: #14171c; color: #e9eef5; }
  .navy  { background: #0a1733; color: #e9eef5; }
  .ember { background: #1a0e0a; color: #f5e1c8; }
  .stone { background: #2a2a2a; color: #f5f3ee; }
  .bone  { background: #ece6d8; color: #2a2620; }

  .label-tag {
    position: absolute; bottom: 12px; left: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.45;
  }
  .artboard-host { position: relative; width: 100%; height: 100%; }
</style>
